{% extends "core/base.html" %}
{% block content %}
<div class="container" style="display:flex;gap:1.5rem">
  <aside style="width:220px">
    <div class="card" style="padding:1rem">
      <ul style="list-style:none;padding:0;margin:0">
        <li><a href="{% url 'core:home' %}">Home</a></li>
        <li><a href="{% url 'interactions:library' %}">Library</a></li>
        <li class="active"><a href="{% url 'interactions:stats' %}">Stats</a></li>
      </ul>
    </div>
  </aside>

  <main style="flex:1">
    <div class="card" style="padding:1rem">
      <h2>Stats</h2>
      <div style="display:flex;gap:1rem;margin-top:1rem">
        <div class="card" style="padding:1rem;min-width:140px;text-align:center">
          <div class="hint">Stories</div>
          <div style="font-weight:700;font-size:1.25rem">{{ articles_count }}</div>
        </div>
        <div class="card" style="padding:1rem;min-width:140px;text-align:center">
          <div class="hint">Likes received</div>
          <div style="font-weight:700;font-size:1.25rem">{{ likes_received }}</div>
        </div>
        <div class="card" style="padding:1rem;min-width:140px;text-align:center">
          <div class="hint">Saved in libraries</div>
          <div style="font-weight:700;font-size:1.25rem">{{ saved_count }}</div>
        </div>
      </div>
    </div>
  </main>

  <aside style="width:220px"></aside>
</div>
{% endblock %}
