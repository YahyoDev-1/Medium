{% extends "core/base.html" %}
{% block content %}
<div class="container center-sheet">
  <div class="card" style="max-width:640px;margin:2rem auto;padding:2rem;text-align:center;">
    <h2>Log out</h2>
    <p class="hint">Are you sure you want to log out?</p>
    <form method="post" style="margin-top:1.25rem;">
      {% csrf_token %}
      <div style="display:flex;gap:.5rem;justify-content:center">
        <a href="{% url 'core:home' %}" class="btn">Cancel</a>
        <button type="submit" class="btn btn-primary">Log out</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
